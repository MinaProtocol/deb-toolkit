# Codecov configuration for deb-toolkit.
#
# Mirrors the conventions in mina-release-toolkit's own codecov.yml so the
# two repos report comparably. That repo ignores deb-toolkit/ on the basis
# that this repo reports its own coverage; .github/workflows/coverage.yml
# is what produces the upload.

coverage:
  # Thresholds are deliberately soft to begin with. At the time this was
  # added the crate measured ~79% region / ~81% line coverage overall,
  # with a wide spread: session/apply.rs and templates.rs above 93%,
  # misc.rs at ~37% and content_verifier.rs at ~50%. Tighten once there
  # is enough trend data to know each module's natural baseline.
  status:
    project:
      default:
        target: auto
        # Absorb the noise floor of small refactors.
        threshold: 1%
        if_ci_failed: ignore
    patch:
      default:
        # New code should be covered, but this warns rather than blocks.
        target: 70%
        if_ci_failed: ignore

flags:
  deb-toolkit:
    paths:
      - src/
    carryforward: true

codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true

ignore:
  # Test scaffolding and fixtures are not the subject under measurement.
  - "tests/"
  - "examples/"
  - "**/target/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
