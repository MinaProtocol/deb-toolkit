name: Coverage

# Reports to Coveralls rather than Codecov. Codecov requires an upload
# token even for public repositories — tokenless uploads are accepted
# only for PRs from forks — and both the repo-level and global tokens are
# reachable only by a GitHub organization owner. Coveralls authenticates
# with the GITHUB_TOKEN that Actions injects automatically, so this
# workflow needs no secret provisioned and no org-level approval.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: cargo llvm-cov
    # Pinned to 22.04 for the same reason as ci.yml: the bundled GPG
    # signing-key fixture under tests/res/ was generated with a digest
    # algorithm that gpg 2.4 (default on ubuntu-24) rejects. Coverage has
    # to run the same tests CI runs, so it needs the same runner.
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Without these the integration tests skip themselves (by design —
      # see README) rather than fail, and every path they exercise —
      # signer.rs, signature_verifier.rs, viewer.rs, and the packaging
      # half of builder.rs — would be reported as uncovered. That
      # understates coverage instead of measuring it, so the coverage job
      # needs the same tooling as the test job.
      - name: Install Debian tooling for integration tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends debsigs debsig-verify

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: |
          cargo llvm-cov --all-features --workspace --lcov \
            --output-path lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: lcov.info
          format: lcov
          # github-token defaults to ${{ github.token }}, which Actions
          # provides automatically. Deliberately not set: Coveralls' docs
          # are explicit that it must not be added to the secrets store.
          #
          # Coverage is an observation, not a merge gate, so a Coveralls
          # outage must not turn a PR red. Unlike the Codecov setup this
          # replaces, there is no permanent misconfiguration this can
          # mask — with no token to omit, a failure here is a real
          # incident rather than a missing secret.
          fail-on-error: false
